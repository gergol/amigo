# Verb database (Plan/04): class + patterns generate all forms; overrides win.
# de: German rendering data (praesens/partizip/aux/praeteritum only where irregular).

verbs:
  # ---------- fully irregular core ----------
  - lemma: ser
    class: er
    module: M01
    level: A1
    gloss_de: sein (Eigenschaft, Herkunft)
    overrides:
      presente.1s: soy
      presente.2s: eres
      presente.3s: es
      presente.1p: somos
      presente.2p: sois
      presente.3p: son
      indefinido.1s: fui
      indefinido.2s: fuiste
      indefinido.3s: fue
      indefinido.1p: fuimos
      indefinido.2p: fuisteis
      indefinido.3p: fueron
      imperfecto.1s: era
      imperfecto.2s: eras
      imperfecto.3s: era
      imperfecto.1p: éramos
      imperfecto.2p: erais
      imperfecto.3p: eran
      imperativo.2s: sé
      imperativo.3s: sea
      imperativo.2p: sed
      imperativo.3p: sean
    valence: { subject: [human, thing] }
    de:
      inf: sein
      aux: sein
      partizip: gewesen
      imperativ2s: sei
      praesens: { 1s: bin, 2s: bist, 3s: ist, 1p: sind, 2p: seid, 3p: sind }
      praeteritum: { 1s: war, 2s: warst, 3s: war, 1p: waren, 2p: wart, 3p: waren }
    notes_de: "ser vs. estar: Deutsch hat nur 'sein'!"
  - lemma: estar
    class: ar
    module: M02
    level: A1
    gloss_de: sein (Ort, Zustand)
    patterns: [strong-pret]
    pretStem: estuv
    overrides:
      presente.1s: estoy
      presente.2s: estás
      presente.3s: está
      presente.3p: están
      imperativo.2s: está
      imperativo.3s: esté
      imperativo.3p: estén
    valence: { subject: [human, thing] }
    de:
      inf: sein
      aux: sein
      partizip: gewesen
      imperativ2s: sei
      praesens: { 1s: bin, 2s: bist, 3s: ist, 1p: sind, 2p: seid, 3p: sind }
      praeteritum: { 1s: war, 2s: warst, 3s: war, 1p: waren, 2p: wart, 3p: waren }
    notes_de: "ser vs. estar: Deutsch hat nur 'sein'!"
  - lemma: ir
    class: ir
    module: M04
    level: A1
    gloss_de: gehen, fahren
    gerund: yendo
    overrides:
      presente.1s: voy
      presente.2s: vas
      presente.3s: va
      presente.1p: vamos
      presente.2p: vais
      presente.3p: van
      indefinido.1s: fui
      indefinido.2s: fuiste
      indefinido.3s: fue
      indefinido.1p: fuimos
      indefinido.2p: fuisteis
      indefinido.3p: fueron
      imperfecto.1s: iba
      imperfecto.2s: ibas
      imperfecto.3s: iba
      imperfecto.1p: íbamos
      imperfecto.2p: ibais
      imperfecto.3p: iban
      imperativo.2s: ve
      imperativo.3s: vaya
      imperativo.2p: id
      imperativo.3p: vayan
    valence: { subject: [human], prep: { prep: a, tags: [place] } }
    de: { inf: gehen, aux: sein, partizip: gegangen }
    notes_de: "Indefinido von ser und ir ist identisch (fui)!"
  - lemma: hay
    class: er
    module: M02
    level: A1
    gloss_de: es gibt
    overrides:
      presente.3s: hay
      indefinido.3s: hubo
      imperfecto.3s: había
      futuro.3s: habrá
    valence: { subject: [thing, place] }
    de: { inf: geben, partizip: gegeben, praesens: { 3s: gibt es } }
    notes_de: "hay = es gibt (unveränderlich); está = befindet sich"
